<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Standards Forum</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="favicon-180.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header-bar">
<a href="#" class="site-home-link site-home-title"><h1 class="site-title">Media Standards Forum</h1></a>
      <a href="#" class="site-home-link"><img src="images/Logo.jpg" alt="MSF" class="site-logo"></a>
    </div>
  </header>

  <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
    <span class="hamburger"></span>
  </button>

  <aside class="sidebar">
    <div class="sidebar-banner">
      <img src="images/Header.png" alt="" class="sidebar-banner-image">
    </div>
    <div class="search-container" id="sidebar-cta">
      <div class="sidebar-cta-btn"><span class="btn-step-number pulse-step">1</span> Select article below</div>
    </div>
    <div class="search-container search-hidden" id="search-container">
      <input
        type="search"
        id="search-input"
        placeholder="Search articles..."
        aria-label="Search articles"
      >
    </div>

    <nav class="complaint-list" aria-label="Complaints">
      <ul id="complaint-list"></ul>
    </nav>
  </aside>

  <main class="content">
    <div id="content-area">
      <div class="welcome">
        <h2>Media Standards Forum</h2>
        <p class="welcome-lead">Holding NZ media to account under the NZ Media Council Principles.</p>
        <p>Loading...</p>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
